<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给妳的信</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: black;
  color: white;
  font-family: system-ui, sans-serif;
  overflow: hidden;
}

/* 星空 */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  0%,100% {opacity:0.2;}
  50% {opacity:1;}
}

/* 信件 */
.container {
  position: relative;
  margin: 50px auto;
  width: 80%;
  max-width: 700px;
  line-height: 1.9;
  font-size: 18px;
  white-space: pre-wrap;
  overflow-y: auto;
  max-height: 90vh;
  z-index: 1;
  background: rgba(0,0,0,0.8);
  padding: 20px;
  border-radius: 10px;
}

/* 返回按钮 */
.backBtn {
  display: none;
  text-align: center;
  margin-top: 30px;
}

.backBtn button {
  padding: 12px 26px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg,#ff8c00,#ff5e62);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.backBtn button:hover {
  transform: scale(1.08);
}

/* 信封 */
.envelope {
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  font-size: 24px;
  padding: 20px 40px;
  background: #ff8c00;
  border-radius: 10px;
  cursor: pointer;
  z-index: 2;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="envelope" onclick="openLetter()">💌 打开信封</div>

<div class="container" id="letter" style="display:none;">
  <div id="content"></div>

  <div class="backBtn" id="backBtn">
    <button onclick="goBack()">上一页</button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  // 星星
  const starsContainer = document.getElementById('stars');
  for(let i=0;i<100;i++){
    const star = document.createElement('div');
    star.className='star';
    star.style.top = Math.random()*100 + '%';
    star.style.left = Math.random()*100 + '%';
    star.style.animationDuration = (Math.random()*3+2) + 's';
    starsContainer.appendChild(star);
  }

  const text = `亲爱的妍妍
虽然早就预告过今天下午还想给你惊喜
但其实我并不是事先准备的，而是在看了妳的信之后想要给予妳回应
没想到我们连互相表白的内容都有这么多相似的地方
真的很幸运我们两个人能够对彼此都毫无保留的展示自己的爱
我也不喜欢感情是不明不白的，在还没有确定妳的心意之前，其实我一直都是做好所有的打算，对妳的宠爱是我克制不了的，那种源自本能一样的想照顾跟保护妳
虽然现在没有办法马上出现在妳眼前，但谢谢妳相信我的真心
到见面那天我会一次把好多这阵子没办法做的没办法说的都一次交给妳说给妳听

见过妳破碎，也见过妳开心，见过妳感动的样子，也见过妳突然泪崩，我能想象妳独自一个人走到现在，这一路上有这么多的困难妳却依然坚持着前行
我知道妳是悲观主义者，其实我也是的，我也不会想着要强迫你必须乐观 
我更贪心的可能是，希望我的存在，不只是给妳安心，不只是给妳温，毕竟对我来说这本来就是该做到的，而是在妳悲观的世界中那点只属于妳且让妳放心的阳光
就像妳出现在我的生命中，那么突然地出现，突然地住下，却也是那么的温暖，让我那么喜欢

落差感可能是很主观的，所以如果今天哪怕是一点点的小事情让妳觉得不对劲，请一定要告诉我，我一定会好好地安抚好妳的情绪，再跟妳说我的想法
不管发生什么事情，希望妳不要放弃我们，不要放弃我，要相信我们可以一一克服一一解决的
情绪上头也好，说话难听也罢，其实我都知道妳的本意跟出发点是舍不得跟心疼我。
放心吧无论要说多少次，在我这里请放心当个小孩，想说啥说啥想做啥做啥，这就是我给妳的底气
我会接住妳的一切，不管以前这一路走来有多少人多少事情多少教训告诉妳要成熟点，在我这里不需要，我也会像小孩子一样跟妳撒娇，所以妳也可以放心像个小孩子跟我闹脾气
真的遇到困难我会把妳保护在我身后，所以放心去闯吧。
不要担心，我都在
我答应妳，吵架的时候说的话不会真的往心里去，但请容许我在争吵结束之后跟妳撒娇索取一点点的安慰跟哄我
我答应妳，绝对不会在你生气说分手就离开，也不会消失，更不要说冷暴力
拧巴的人不只需要强制的爱 也需要赶不走的爱人 虽然我瘦了一点不过妳大可放心妳推不开我的
更不要说什么下头 知道妳对我愿意说出心里话也是一个很大的进步!我都知道的，所以请放心吧!

别说什么知道妳是这样的人还愿意的话不要食言，妳可好了，是我心头肉，炫耀都来不及了呢~
愿意我愿意，说一百次我都愿意，妳就是我的，我的宝宝就是最好的宝宝!

妳喜欢的我都会尽力做到，这并不只是因为不能见面才去做，而是我觉得妳值得呀，妳的世界也许因为好多事情变得零零碎碎，但我不在乎它是否会漏水会淋到雨
万物皆有裂痕，而那是阳光照进来的地方，妳躲在藏在每个缝隙里的孩子气还有小脾气，我会全部都找出来好好的安抚，如果有缺漏请妳不要吝啬的展现给我看
我的疼爱不是只有爱妳的好，妳所有的样子我都喜欢
妳对我表达的喜欢，无论何种方式我都接收到了，所以请放心，开口直说也好，隐晦表达也好，这些我都放在心里很感动
不晓得你听过多少人告诉你，妳很重要，妳很特别，很爱妳
但在我这这些话恰恰是我不只说，还会做到的。无论是前任也好，或是谁让妳有过希望又失望
在我这里都不会再发生了，交给时间证明，我不会让妳再说出对我失望，也不会让妳觉得伸手了又推入谷底
相信我，这一次会不一样，这双手不会只是伸手，我会温柔的接住妳，把妳和妳值得被守护的温柔一齐稳稳地托住
知道妳可能悲观，可能有不配得感，所以我对于妳我是不由自主的温柔，想要温柔的把妳抱在我的怀里
希望妳明白的是，这份爱不是沉重，这份偏爱是不需要妳回报的，无伦要我说多少次，这份温柔跟宠爱就是专属于妳，妳值得的
还记得我在妳的满月信里说过 "无论世界多坏，总会有一个人抱着鲜花向你走来" 这句话代表的是希望
其实还有另外一段我想专属给妳的就是"我会替妳撑伞，为你遮风挡雨，如果妳不喜欢撑伞，那我就陪妳一起淋雨"，
我不是一个很善于口语表达的人，我的内心世界总是丰富大过我能说出的话，但我依然想向你展示我的决心
也许在未来，时间的长河里，我能继续给妳勇气和希望，让妳有充足的底气不再害怕世界那些恶意，不再担心回家被催婚，不再害怕自己是一个人
因为妳的身后永远都会有我在
想和妳一起在夜晚散步，照着月光数着星星，牵着我的妍妍指着地上的影子说，这个是我的影子，这个也是我的
今天是九月九日，心也好，梦想也好，妳的一切我都会保护好，不是我想，而是我会，我要跟妳在一起直到尽头，不是希望99，而是我会做好，让妳相信我们会一直久久的
嘴边的碎碎念，终于变成了身边的岁岁年年
妳需要我，我会一直陪着妳，会有多久，就是看我的妍妍想要拥有我多久了!
我的妍妍，就让我们一起为梦想努力，妳再也不是一个人了
谢谢妳鼓起勇气的豪赌在我身上，我不会让妳输，也不会让妳失望的!
我爱妳`;

  const content = document.getElementById('content');
  const container = document.getElementById('letter');

  let i = 0;
  let autoScroll = true;

  // ✅ 监听用户滚动
  container.addEventListener("scroll", function () {
    const isAtBottom =
      container.scrollHeight - container.scrollTop - container.clientHeight < 20;

    autoScroll = isAtBottom;
  });

  function typeWriter() {
    if (i < text.length) {
      content.innerHTML += text.charAt(i);
      i++;

      // ✅ 只有在“用户在底部”才自动滚动
      if (autoScroll) {
        container.scrollTop = container.scrollHeight;
      }

      setTimeout(typeWriter, 65);
    } else {
      document.getElementById("backBtn").style.display = "block";
    }
  }

  window.openLetter = function() {
    document.querySelector(".envelope").style.display = "none";
    document.getElementById("letter").style.display = "block";

    // 一开始默认在底部
    container.scrollTop = container.scrollHeight;

    typeWriter();
  }

  window.goBack = function() {
    window.location.href = "menus.html";
  }

});
</script>

</body>
</html>
