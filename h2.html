<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fluid Heart Ultimate</title>
<style>
body { margin:0; background:black; overflow:hidden; }
</style>
</head>
<body>

<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.152.2/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.152.2/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.152.2/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
// ===== 基础 =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 2;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== Bloom =====
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));

const bloom = new THREE.UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  2.2, // 强度（关键）
  0.4,
  0.85
);
composer.addPass(bloom);

// ===== Shader 材质 =====
const material = new THREE.ShaderMaterial({
  uniforms: {
    u_time: { value: 0 }
  },
  vertexShader: `
    void main() {
      gl_Position = vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;
    uniform float u_time;

    // ❤️ 心形函数
    float heart(vec2 p){
      p *= 1.5;
      float x = p.x;
      float y = p.y;
      return pow(x*x + y*y - 1.0, 3.0) - x*x*y*y*y;
    }

    // 🌊 noise（流体关键）
    float noise(vec2 p){
      return sin(p.x*3.0 + u_time) * sin(p.y*3.0 + u_time);
    }

    void main(){
      vec2 uv = gl_FragCoord.xy / vec2(${window.innerWidth.toFixed(1)}, ${window.innerHeight.toFixed(1)});
      uv = uv * 2.0 - 1.0;

      uv.x *= ${ (window.innerWidth / window.innerHeight).toFixed(3) };

      // 💥 流体扭曲
      float n = noise(uv * 2.0);
      uv += n * 0.05;

      // ❤️ 心形边界
      float h = heart(uv);

      // ✨ 光带
      float glow = smoothstep(0.02, 0.0, abs(h));

      // 💥 底部爆发
      float dist = length(uv - vec2(0.0, -0.6));
      float burst = 0.02 / dist;

      float finalGlow = glow + burst;

      gl_FragColor = vec4(vec3(finalGlow), 1.0);
    }
  `
});

// 全屏平面
const geometry = new THREE.PlaneGeometry(2,2);
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// ===== 动画 =====
function animate(){
  requestAnimationFrame(animate);
  material.uniforms.u_time.value += 0.03;
  composer.render();
}
animate();

// 自适应
window.addEventListener("resize", ()=>{
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
