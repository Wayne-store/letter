<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给妳的信</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: black;
  color: white;
  font-family: system-ui, sans-serif;
  overflow: hidden;
}

/* 星空 */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  0%,100% {opacity:0.2;}
  50% {opacity:1;}
}

/* 信件 */
.container {
  position: relative;
  margin: 50px auto;
  width: 80%;
  max-width: 700px;
  line-height: 1.9;
  font-size: 18px;
  white-space: pre-wrap;
  overflow-y: auto;
  max-height: 90vh;
  z-index: 1;
  background: rgba(0,0,0,0.8);
  padding: 20px;
  border-radius: 10px;
}

/* 返回按钮 */
.backBtn {
  display: none;
  text-align: center;
  margin-top: 30px;
}

.backBtn button {
  padding: 12px 26px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg,#ff8c00,#ff5e62);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.backBtn button:hover {
  transform: scale(1.08);
}

/* 信封 */
.envelope {
  position: fixed;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  font-size: 24px;
  padding: 20px 40px;
  background: #ff8c00;
  border-radius: 10px;
  cursor: pointer;
  z-index: 2;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="envelope" onclick="openLetter()">💌 打开信封</div>

<div class="container" id="letter" style="display:none;">
  <div id="content"></div>

  <div class="backBtn" id="backBtn">
    <button onclick="goBack()">上一页</button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  // 星星
  const starsContainer = document.getElementById('stars');
  for(let i=0;i<100;i++){
    const star = document.createElement('div');
    star.className='star';
    star.style.top = Math.random()*100 + '%';
    star.style.left = Math.random()*100 + '%';
    star.style.animationDuration = (Math.random()*3+2) + 's';
    starsContainer.appendChild(star);
  }

  const text = `（你的原本文字已保留，这里省略）`;

  const content = document.getElementById('content');
  const container = document.getElementById('letter');

  let i = 0;
  let autoScroll = true;

  // ✅ 监听用户滚动
  container.addEventListener("scroll", function () {
    const isAtBottom =
      container.scrollHeight - container.scrollTop - container.clientHeight < 20;

    autoScroll = isAtBottom;
  });

  function typeWriter() {
    if (i < text.length) {
      content.innerHTML += text.charAt(i);
      i++;

      // ✅ 只有在“用户在底部”才自动滚动
      if (autoScroll) {
        container.scrollTop = container.scrollHeight;
      }

      setTimeout(typeWriter, 65);
    } else {
      document.getElementById("backBtn").style.display = "block";
    }
  }

  window.openLetter = function() {
    document.querySelector(".envelope").style.display = "none";
    document.getElementById("letter").style.display = "block";

    // 一开始默认在底部
    container.scrollTop = container.scrollHeight;

    typeWriter();
  }

  window.goBack = function() {
    window.location.href = "menu.html";
  }

});
</script>

</body>
</html>
