<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>高级流光心</title>
<style>
body { margin:0; background:black; overflow:hidden; }
</style>
</head>
<body>

<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.z = 120;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ❤️ 心形函数
function heart(t){
  let x = 16*Math.pow(Math.sin(t),3);
  let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
  return new THREE.Vector3(x,y,0);
}

// 💥 创建流线
const group = new THREE.Group();

for(let i=0;i<200;i++){
  let pts = [];

  let tStart = Math.random()*Math.PI;
  let tEnd = Math.PI + Math.random()*Math.PI;

  for(let j=0;j<80;j++){
    let t = tStart + (tEnd - tStart)*(j/80);
    let p = heart(t);

    let base = new THREE.Vector3(0,-30,0);

    let final = base.clone().lerp(p.multiplyScalar(2.2), j/80);

    // 加点扰动（流体感关键）
    final.x += (Math.random()-0.5)*2;
    final.y += (Math.random()-0.5)*2;

    pts.push(final);
  }

  let geo = new THREE.BufferGeometry().setFromPoints(pts);

  let mat = new THREE.LineBasicMaterial({
    color:0xffffff,
    transparent:true,
    opacity:0.3
  });

  let line = new THREE.Line(geo,mat);
  group.add(line);
}

scene.add(group);

// 🌟 粒子
const particles = new THREE.BufferGeometry();
const count = 1000;

let arr = new Float32Array(count*3);

for(let i=0;i<count;i++){
  arr[i*3]=(Math.random()-0.5)*120;
  arr[i*3+1]=(Math.random()-0.5)*120;
  arr[i*3+2]=0;
}

particles.setAttribute("position", new THREE.BufferAttribute(arr,3));

const pMat = new THREE.PointsMaterial({
  color:0xffffff,
  size:1.2
});

const mesh = new THREE.Points(particles,pMat);
scene.add(mesh);

// 🎬 动画
function animate(){
  requestAnimationFrame(animate);

  group.rotation.z += 0.0015;
  mesh.rotation.z -= 0.0005;

  renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
