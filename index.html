<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>妳的专属入口</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: url("bg.jpg") no-repeat center center;
  background-size: cover;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
  overflow: hidden;
}

/* 黑色遮罩 */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

/* 内容 */
.box {
  position: relative;
  text-align: center;
  z-index: 1;
  opacity: 0;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.text {
  font-size: 5vw;
  margin-bottom: 30px;
  line-height: 1.8;
}

/* 按钮 */
.btn {
  padding: 12px 30px;
  border: 1px solid white;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
  opacity: 0;
  animation: showBtn 2s 2s forwards;
}

@keyframes showBtn {
  to { opacity: 1; }
}

.btn:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<div class="box">
  <div class="text">
    如果妳愿意点进来<br>
    我就当作<br>
    妳愿意让我再靠近一点
    我把想告诉妳的都记录在这里
    只要妳想，随时可以确认
  </div>

  <div class="btn" onclick="goMenu()">进入</div>
</div>

<script>
function goMenu(){
  window.location.href = "menu.html";
}
</script>

</body>
</html>
