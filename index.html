<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>妳的专属入口</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: black;
  color: white;
  font-family: system-ui, sans-serif;
  overflow: hidden;

  /* 居中内容 */
  display: flex;
  justify-content: center; /* 水平居中 */
  align-items: center;     /* 垂直居中 */
  height: 100vh;           /* 满屏高度 */
  text-align: center;      /* 文本居中 */
}

/* 星空层 */
.stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  0%,100% {opacity:0.2;}
  50% {opacity:1;}
}

/* 黑色遮罩 */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 0;
}

/* 内容盒子 */
.box {
  z-index: 1;
  opacity: 0;
  animation: fadeIn 2s forwards;

  display: flex;
  flex-direction: column;
  align-items: center;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.text {
  font-size: 15px;
  margin-bottom: 30px;
  line-height: 1.8;
}

/* 按钮 */
.btn {
  padding: 12px 30px;
  border: 1px solid white;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
  opacity: 0;
  animation: showBtn 2s 2s forwards;
}

@keyframes showBtn {
  to { opacity: 1; }
}

.btn:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<!-- 星空层 -->
<div class="stars" id="stars"></div>

<div class="box">
  <div class="text">
    如果妳愿意点进来<br>
    我就当作<br>
    妳愿意让我再靠近一点<br>
    我把想告诉妳的都记录在这里<br>
    只要妳想，随时可以确认<br><br>
    "这一百步都由我来"
  </div>

  <div class="btn" onclick="goMenu()">进入</div>
</div>

<script>
// 跳转
function goMenu(){
  window.location.href = "menu.html";
}

// 生成星星
const starsContainer = document.getElementById('stars');

for (let i = 0; i < 120; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.top = Math.random() * 100 + '%';
  star.style.left = Math.random() * 100 + '%';
  star.style.animationDuration = (Math.random() * 3 + 2) + 's';
  starsContainer.appendChild(star);
}
</script>

</body>
</html>
