<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>给妳的信</title>
<style>
  /* 背景星空 */
  body {
    margin: 0;
    padding: 0;
    background: black;
    color: white;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }
  .stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 2s infinite;
  }
  @keyframes twinkle {
    0%,100% {opacity:0.2;}
    50% {opacity:1;}
  }

  /* 信件容器 */
  .container {
    position: relative;
    margin: 50px auto;
    width: 80%;
    max-width: 700px;
    line-height: 1.9;
    font-size: 18px;
    white-space: pre-wrap;
    overflow-y: auto;
    max-height: 90vh;
    z-index: 1;
  }

  /* 信封按钮 */
  .envelope {
    position: fixed;
    top:50%;
    left:50%;
    transform: translate(-50%, -50%);
    font-size: 24px;
    padding: 20px 40px;
    background: #ff8c00;
    border-radius: 10px;
    cursor: pointer;
    z-index: 2;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="envelope" onclick="openLetter()">💌 打开信封</div>

<div class="container" id="letter" style="display:none;"></div>

<script>
  // 生成星星
  const starsContainer = document.getElementById('stars');
  for(let i=0;i<100;i++){
    const star = document.createElement('div');
    star.className='star';
    star.style.top = Math.random()*100 + '%';
    star.style.left = Math.random()*100 + '%';
    star.style.animationDuration = (Math.random()*3+2) + 's';
    starsContainer.appendChild(star);
  }

  // 信件内容
  const text = `宝宝：

有时上秒刚才还在和我分享着一切，
下秒突然因为任何事失去了兴趣躲起来。
虽然没有直说，
但我想妳可能又胡思乱想，
或是单纯没有能量了，
默默地退回自己的舒适圈里，
把一切藏起来。

我不敢说真的最懂妳，
或是我是最了解妳的人，
但我绝对是满怀着真诚想要好好地了解妳，
从我们相识相知的过程，
从妳的诉苦与分享妳的过去，
那些被小心隐藏的需求跟渴望。

我想是不是太过亲密的距离，
会让妳觉得自己的一切无所遁形，
那对妳来说有时候不是温暖而是莫名的心慌；
妳也怕自己付出的真诚并没有得到妳想要的结果，
更害怕最后只换来落空的辜负。

所以妳经常用“无所谓”“算了”掩饰一切事情跟真心，
用“都可以”推开选择，
把这些话当成妳最后的壁垒，
想要护住心底任何的角落。

可是宝宝，这些都不是妳的错呀。

或许是成长的过程充满不容易跟质疑，
让妳不敢轻易袒露心声；
或许是上一段感情留下的伤，
让妳对“爱”这件事充满了迟疑。

妳从不是不会爱人，
只是被伤害的恐惧总是阻碍了脚步，
时刻提醒妳不要陷得太深，
害怕一切又重蹈覆辙，
才会在靠近时如此犹豫，小心翼翼。
在太过幸福的时候担心失去，
用冷漠的态度想要武装自己，
避免欣喜过后的失落，
但希望妳要相信自己值得被爱，
也有幸福的权利。

我知道，
在妍妍心里有一堵很高的高墙，
妳不希望被推倒，
害怕倒下后露出毫无防备的自己，
那样的自己如果不够有安全感便让妳感觉到十足的不安，
我明白这样的高墙需要用温柔的爱慢慢陪伴。

没关系，
我有足够的耐心，也有坚定的信心。
我会用一遍又一遍的用我说过的“我等妳”“我会陪着妳”，
去证明我说的话，捂热妳心里的角落，
不用担心那背后有多少裂痕，
我说过，裂痕都是阳光照射进来的地方，
我会陪妳慢慢卸下防备，
最起码在我面前不需要武装。
请不要感到压力，
我并不会时不时地去敲击，
我只会在妳需要的时候替妳在建造好的城墙画上涂鸦，
补上破损的部分，
爱是爱着全部的妳，
偶尔想躲躲也没关系，
我会乖乖的等妳。

我清楚妳总爱在心里预设防线，
担心太过依赖就会面临失去，
甚至会想，
要是提前逃走，
是不是就能避开所有糟糕的结局。

但宝宝，
爱情从来都不是一场精打细算的博弈，
不是谁先付出谁就输了。
我只想让妳感受的到被爱，
我说过很多次，
妳值得被人坚定地选择，
值得被人温柔地接住所有情绪，
值得拥有一份不用提心吊胆的爱，
也值得像个小孩一样放心依赖。

妳不用逼自己，
不需要立刻学会表达，
也不需要立刻学会有话直说的说出诉求，
不用假装毫不在乎的说没事来带过妳一切的小情绪，
更不用刻意维持看似独立的距离。

要相信，
会有人单纯因为是妳，
就心甘情愿对妳好，
给妳十足的信任和安全感；
会有人尊重妳需要的边界，
陪妳建立一段细水长流、踏实可靠的关系。
不只是我，
还有这一路走来和妳在直播间待过无数夜晚的粉丝们。

爱妳的人，
总能读懂妳沉默背后的千言万语。
我们都是带着几分胆怯、些许担心，
慢慢向彼此靠近的，
所以不用急，也不用怕，
慢慢来，
就是最好的方式。

宝宝，
以后就安安稳稳待在我身边吧。
哪怕不善言辞，
从不会主动靠近，
哪怕只是远远看见妳的身影，
都能让我满心欢喜。
虽然妳走的总是比我快，
但我不会落后妳太多，
也会做妳最坚实的依靠，
尽力替妳挡住风雨，
挡不住就陪妳一起淋雨。
那些因为争吵伴着眼泪吃下的饭，
以后我都希望妳都不会再尝到了。
我还在学，也还在努力，
有时候太过着急，
妳可以告诉我不要急，
让我给妳一点时间，提醒我一下。

也许有天，
也许那颗紧紧蜷缩的心，
妳会放心地交给我，
不用再提前预想分离，
想邀请妳放心的，
大胆地做自己，
我对妳的爱胜过所有道理，
不要担心做自己会有人看不惯，
介意的人不重要，
重要的人不介意，
也不用再想着逃跑，
我会一直在这里，
等妳，
陪妳，
爱妳，
也会在妳需要的时候在妳身后紧紧抱着妳。
妳一直都是那个最好的妍妍，
我爱妳，
也谢谢妳爱着我。`;

  // 打字动画
function typeWriter() {
  if (i < text.length) {
    letterDiv.innerHTML += text.charAt(i);
    i++;

    // 自动滚动到最新文字
    letterDiv.scrollTop = letterDiv.scrollHeight;

    setTimeout(typeWriter, 65); // 打字速度
  }
}
</script>

</body>
</html>
