<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>给妳的世界</title>

<style>
 body {
    margin: 0;
    padding: 0;
    background: black;
    color: white;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }
  .stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 2s infinite;
  }
  @keyframes twinkle {
    0%,100% {opacity:0.2;}
    50% {opacity:1;}
  }

/* 按钮 */
.btn {
  margin: 12px;
  padding: 12px 30px;
  border: 1px solid white;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<h1> "妳是我温柔且坚定地选择" </h1>
<h2> "心决定的事情，千言万语也说不清" </h2>

<div class="btn" onclick="goLetter()">💌 想对妳说的话</div>
<div class="btn" onclick="goMemory()">🌙 那些回忆</div>
<div class="btn" onclick="goFuture()">🫶 关于未来</div>

<script>
function goLetter(){
  window.location.href = "letter.html";
}
function goMemory(){
  window.location.href = "memory.html";
}
function goFuture(){
  window.location.href = "future.html";
}
</script>

</body>
</html>
