<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>给妳的世界</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-family: sans-serif;
}

/* 按钮 */
.btn {
  margin: 12px;
  padding: 12px 30px;
  border: 1px solid white;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<h2>🌙 想带妳看的东西</h2>

<div class="btn" onclick="goLetter()">💌 想对妳说的话</div>
<div class="btn" onclick="goMemory()">🌙 那些回忆</div>
<div class="btn" onclick="goFuture()">🫶 关于未来</div>

<script>
function goLetter(){
  window.location.href = "letter.html";
}
function goMemory(){
  window.location.href = "memory.html";
}
function goFuture(){
  window.location.href = "future.html";
}
</script>

</body>
</html>
