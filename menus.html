<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>专属回忆</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: black;
  color: white;
  font-family: system-ui, sans-serif;
  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;

  /* 🔥 整体字体放大 */
  font-size: 18px;
}

/* 星空 */
.stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  0%,100% {opacity:0.2;}
  50% {opacity:1;}
}

/* 内容卡片 */
.box {
  position: relative;
  z-index: 1;
  max-width: 420px;
  width: 90%;

  /* 🔥 微放大一点更舒服 */
  transform: scale(1.05);
}

/* 🔥 标题放大 */
h1 {
  font-size: clamp(26px, 7vw, 36px);
  margin-bottom: 16px;
}

h2 {
  font-size: clamp(18px, 5vw, 22px);
  margin-bottom: 40px;
  opacity: 0.9;
}

/* 🔥 按钮放大 */
.btn {
  margin: 14px auto;
  padding: 16px 32px;
  border: 1px solid white;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
  width: 240px;

  font-size: clamp(16px, 4.5vw, 18px);
}

.btn:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="box">
  <h1>"讨厌异地恋一百次"</h1>
  <h2>"但我会爱上你一百零一次"</h2>

  <div class="btn" onclick="goLetter()">💌 满月的话 </div>
  <div class="btn" onclick="goMemory()">🌙 2025/9/9 </div>
  <div class="btn" onclick="goFuture()">🫶 待续 </div>
</div>

<script>
// 跳转
function goLetter(){
  window.location.href = "memory.html";
}
function goMemory(){
  window.location.href = "99.html";
}
function goFuture(){
  window.location.href = "menu.html";
}

// 星空
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.top = Math.random() * 100 + '%';
  star.style.left = Math.random() * 100 + '%';
  star.style.animationDuration = (Math.random() * 3 + 2) + 's';
  starsContainer.appendChild(star);
}
</script>

</body>
</html>
